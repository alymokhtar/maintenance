name: Maintenance Event Notifications

on:
  schedule:
    # Checks for newly recorded maintenance notifications every 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  send-maintenance-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Send maintenance event notifications
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node send-maintenance-events.js
